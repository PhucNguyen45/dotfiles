# =============================================================================
# Starship Prompt Configuration
# =============================================================================
# This is a fallback prompt when Powerlevel10k is not available (e.g., in bash)
# For the main shell (zsh), Powerlevel10k is used instead.

# Make the prompt one line
add_newline = false

[character]
success_symbol = "[❯]"
error_symbol = "[❯]"

[git_branch]
symbol = ""
format = "[$symbol$branch]($style) "

[git_status]
format = "([$all_status$ahead_behind]($style)) "

[nodejs]
format = "via [$symbol$version]($style) "

[python]
format = "via [$symbol$version]($style) "

[rust]
format = "via [$symbol$version]($style) "

[golang]
format = "via [$symbol$version]($style) "

[package]
disabled = true

[cmd_duration]
min_time = 2000
format = "⏱️ [$duration]($style) "
